services:
  postgres:
    image: postgres:16-alpine
    container_name: nusaquest_db
    environment:
      POSTGRES_USER: nusaquest
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nusaquest_secret}
      POSTGRES_DB: nusaquest
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nusaquest"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nusaquest_api
    environment:
      DATABASE_URL: postgresql://nusaquest:${DB_PASSWORD:-nusaquest_secret}@postgres:5432/nusaquest
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-not_set}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-not_set}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      PORT: 3001
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nusaquest_web
    restart: always

  nginx:
    image: nginx:stable-alpine
    container_name: nusaquest_proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  pgdata:
  uploads_data:
